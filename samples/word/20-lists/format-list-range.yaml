id: word-lists-format-list-range
name: Format and inspect list range
description: This sample shows how to read list formatting properties and count items by level and number type.
host: WORD
api_set:
    WordApiDesktop: '1.3'
script:
    content: |
        document.getElementById("get-list-format-info").addEventListener("click", () => tryCatch(getListFormatInfo));
        document.getElementById("count-level-1").addEventListener("click", () => tryCatch(countLevel1Items));
        document.getElementById("count-level-2").addEventListener("click", () => tryCatch(countLevel2Items));
        document.getElementById("count-all-numbers").addEventListener("click", () => tryCatch(countAllNumbers));
        document.getElementById("setup").addEventListener("click", () => tryCatch(setup));

        async function getListFormatInfo() {
          // Gets the range covering the entire body and reads list formatting properties.
          await Word.run(async (context) => {
            const bodyRange: Word.Range = context.document.body.getRange();
            const listFormat: Word.ListFormat = bodyRange.listFormat;
            listFormat.load("isSingleList, listType, listLevelNumber, listString, listValue");
            await context.sync();

            console.log("List format info for the body range:");
            console.log(`- Is single list: ${listFormat.isSingleList}`);
            console.log(`- List type: ${listFormat.listType}`);
            console.log(`- List level number (first paragraph): ${listFormat.listLevelNumber}`);
            console.log(`- List string (first paragraph): "${listFormat.listString}"`);
            console.log(`- List value (first paragraph): ${listFormat.listValue}`);
          });
        }

        async function countLevel1Items() {
          // Counts only the level-1 (top-level) numbered paragraphs in the body range.
          await Word.run(async (context) => {
            const bodyRange: Word.Range = context.document.body.getRange();
            const listFormat: Word.ListFormat = bodyRange.listFormat;

            const options: Word.ListFormatCountNumberedItemsOptions = {
              level: 1,
              numberType: Word.NumberType.paragraph,
            };
            const count: OfficeExtension.ClientResult<number> = listFormat.countNumberedItems(options);
            await context.sync();

            console.log(`Level-1 item count: ${count.value}`);
          });
        }

        async function countLevel2Items() {
          // Counts only the level-2 (sub-level) numbered paragraphs in the body range.
          await Word.run(async (context) => {
            const bodyRange: Word.Range = context.document.body.getRange();
            const listFormat: Word.ListFormat = bodyRange.listFormat;

            const options: Word.ListFormatCountNumberedItemsOptions = {
              level: 2,
              numberType: Word.NumberType.paragraph,
            };
            const count: OfficeExtension.ClientResult<number> = listFormat.countNumberedItems(options);
            await context.sync();

            console.log(`Level-2 item count: ${count.value}`);
          });
        }

        async function countAllNumbers() {
          // Counts all numbered items across every level using numberType: AllNumbers.
          await Word.run(async (context) => {
            const bodyRange: Word.Range = context.document.body.getRange();
            const listFormat: Word.ListFormat = bodyRange.listFormat;

            const options: Word.ListFormatCountNumberedItemsOptions = {
              numberType: Word.NumberType.allNumbers,
            };
            const count: OfficeExtension.ClientResult<number> = listFormat.countNumberedItems(options);
            await context.sync();

            console.log(`Total numbered items (all levels): ${count.value}`);
          });
        }

        async function setup() {
          await Word.run(async (context) => {
            const body: Word.Body = context.document.body;
            body.clear();
            body.insertParagraph("Project task list", "Start");

            // Start a numbered list with the first task.
            const item1: Word.Paragraph = body.insertParagraph("Design phase", "End");
            const list: Word.List = item1.startNewList();
            list.load("$none");
            await context.sync();

            // Add level-2 sub-items under "Design phase".
            const sub1: Word.Paragraph = list.insertParagraph("Create wireframes", "End");
            sub1.listItem.level = 1;
            const sub2: Word.Paragraph = list.insertParagraph("Review wireframes", "End");
            sub2.listItem.level = 1;

            // Add top-level items with sub-items.
            const item2: Word.Paragraph = list.insertParagraph("Development phase", "End");
            item2.listItem.level = 0;
            const sub3: Word.Paragraph = list.insertParagraph("Implement front end", "End");
            sub3.listItem.level = 1;
            const sub4: Word.Paragraph = list.insertParagraph("Implement back end", "End");
            sub4.listItem.level = 1;

            const item3: Word.Paragraph = list.insertParagraph("Testing phase", "End");
            item3.listItem.level = 0;

            await context.sync();

            console.log("Setup complete. The document has a 2-level numbered list: 3 level-1 items and 4 level-2 sub-items.");
          });
        }

        // Default helper for invoking an action and handling errors.
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
            <p>This sample demonstrates how to use <code>Range.listFormat</code> to inspect list formatting on a range,
                and how to call <code>ListFormat.countNumberedItems</code> with <code>ListFormatCountNumberedItemsOptions</code>
                to count items by level and number type.</p>
        </section>
        <section class="setup">
            <h3>Set up</h3>
            <button id="setup">Set up</button>
        </section>
        <section>
            <h3>Try it out</h3>
            <ul>
                <li>
                    <div>Reads <code>listType</code>, <code>listLevelNumber</code>, <code>listString</code>,
                        <code>listValue</code>, and <code>isSingleList</code> from the body range's
                        <code>listFormat</code>.</div>
                    <button id="get-list-format-info">Get list format info</button>
                </li>
                <li>
                    <div>Counts level-1 (top-level) items using <code>countNumberedItems({ level: 1, numberType: "Paragraph" })</code>.</div>
                    <button id="count-level-1">Count level-1 items</button>
                </li>
                <li>
                    <div>Counts level-2 (sub-level) items using <code>countNumberedItems({ level: 2, numberType: "Paragraph" })</code>.</div>
                    <button id="count-level-2">Count level-2 items</button>
                </li>
                <li>
                    <div>Counts all numbered items across every level using <code>countNumberedItems({ numberType: "AllNumbers" })</code>.</div>
                    <button id="count-all-numbers">Count all numbers</button>
                </li>
            </ul>
        </section>
    language: html
