id: word-selection-insert-symbol
name: Insert symbol
description: Inserts a Unicode or ANSI symbol at the selection.
host: WORD
api_set:
    WordApiDesktop: '1.4'
script:
    content: |
        document.getElementById("insert-copyright").addEventListener("click", () => tryCatch(insertCopyright));
        document.getElementById("insert-em-dash").addEventListener("click", () => tryCatch(insertEmDash));
        document.getElementById("insert-wingdings").addEventListener("click", () => tryCatch(insertWingdings));
        document.getElementById("setup").addEventListener("click", () => tryCatch(setup));

        async function insertCopyright() {
          // Inserts the copyright symbol © (Unicode U+00A9) at the selection.
          await Word.run(async (context) => {
            const options: Word.SelectionInsertSymbolOptions = {
              unicode: true,
            };
            context.document.selection.insertSymbol(0x00a9, options);
            await context.sync();

            console.log("Inserted copyright symbol ©.");
          });
        }

        async function insertEmDash() {
          // Inserts an em dash — (Unicode U+2014) at the selection.
          await Word.run(async (context) => {
            const options: Word.SelectionInsertSymbolOptions = {
              unicode: true,
            };
            context.document.selection.insertSymbol(0x2014, options);
            await context.sync();

            console.log("Inserted em dash —.");
          });
        }

        async function insertWingdings() {
          // Inserts a Wingdings checkmark (ANSI character 252) at the selection.
          // The font option selects the symbol font, unicode: false uses the ANSI code point,
          // and bias: Word.FontBias.standard ensures the standard (non-East-Asian) glyph is used.
          await Word.run(async (context) => {
            const options: Word.SelectionInsertSymbolOptions = {
              font: "Wingdings",
              unicode: false,
              bias: Word.FontBias.standard,
            };
            context.document.selection.insertSymbol(252, options);
            await context.sync();

            console.log("Inserted Wingdings checkmark (character 252).");
          });
        }

        async function setup() {
          // Creates a document with sample text.
          await Word.run(async (context) => {
            const body: Word.Body = context.document.body;
            body.clear();
            body.insertParagraph(
              "Place your cursor anywhere in this line or select a portion of text, then choose a button to insert a symbol at that location.",
              Word.InsertLocation.start,
            );
            await context.sync();

            console.log("Setup complete. Place your cursor in the document, then try inserting a symbol.");
          });
        }

        // Default helper for invoking an action and handling errors.
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
            <p>This sample demonstrates how to insert a symbol at the selection using <code>Selection.insertSymbol</code>.
            The <code>SelectionInsertSymbolOptions</code> parameter lets you specify the symbol font, whether to use a
            Unicode or ANSI character number, and the font bias for East Asian characters.</p>
        </section>
        <section class="setup">
            <h3>Set up</h3>
            <button id="setup">Set up</button>
        </section>
        <section>
            <h3>Try it out</h3>
            <p>Place your cursor in the document text or select a portion of text, then choose a button.</p>
            <ul>
                <li>
                    <div>Inserts the copyright symbol <strong>©</strong> (Unicode U+00A9) using <code>unicode: true</code>.</div>
                    <button id="insert-copyright">Insert copyright ©</button>
                </li>
                <li>
                    <div>Inserts an em dash <strong>—</strong> (Unicode U+2014) using <code>unicode: true</code>.</div>
                    <button id="insert-em-dash">Insert em dash —</button>
                </li>
                <li>
                    <div>Inserts a Wingdings checkmark using <code>font: "Wingdings"</code>, <code>unicode: false</code>, and <code>bias: Word.FontBias.standard</code>.</div>
                    <button id="insert-wingdings">Insert Wingdings checkmark</button>
                </li>
            </ul>
        </section>
    language: html
