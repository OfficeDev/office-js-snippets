order: 12
id: excel-custom-functions-sync-conditional-format
name: Synchronous custom function - conditional formatting
description: A synchronous custom function used in a conditional format rule to highlight cells that exceed a target value, updated dynamically during Excel's calculation.
host: EXCEL
api_set:
    CustomFunctionsRuntime: 1.5
script:
    content: |-
        /**
         * Returns true if the value exceeds the target read from another cell,
         * evaluated synchronously with Excel's calculation.
         * Use this function in a conditional format rule to highlight cells dynamically.
         * @customfunction
         * @supportSync
         * @param {number} value The value to check.
         * @param {string} targetAddress The cell address containing the target threshold, e.g. "$A$1"
         * @param {CustomFunctions.Invocation} invocation
         * @returns {Promise<boolean>} True if value exceeds the target.
         */
        async function exceedsTarget(value: number, targetAddress: string, invocation: CustomFunctions.Invocation): Promise<boolean> {
          const context = new Excel.RequestContext();
          context.setInvocation(invocation as any);
          const range = context.workbook.worksheets.getActiveWorksheet().getRange(targetAddress);
          range.load("values");
          await context.sync();
          const target = range.values[0][0];
          return typeof target === "number" && value > target;
        }

        document.getElementById("setup").addEventListener("click", () => tryCatch(setup));
        document.getElementById("verify").addEventListener("click", () => tryCatch(verify));

        async function setup() {
          await Excel.run(async (context) => {
            const sheet = context.workbook.worksheets.getActiveWorksheet();

            // A1 holds the target threshold value.
            sheet.getRange("A1").values = [[70]];
            sheet.getRange("A1").format.font.bold = true;

            // B1:B8 hold a header and sample scores.
            sheet.getRange("B1").values = [["Score"]];
            sheet.getRange("B2:B8").values = [[45], [82], [91], [60], [78], [55], [88]];

            await context.sync();
            console.log("Data ready. A1 = target (70). B2:B8 = sample scores.");
            console.log("Next: apply a conditional format rule to B2:B8 using the formula shown in step 3.");
          });
        }

        async function verify() {
          await Excel.run(async (context) => {
            const sheet = context.workbook.worksheets.getActiveWorksheet();
            const range = sheet.getRange("B2:B8");
            const formats = range.conditionalFormats.load("items");
            await context.sync();

            if (formats.items.length === 0) {
              console.log("No conditional formats found on B2:B8. Complete step 3 first.");
            } else {
              console.log(`${formats.items.length} conditional format(s) active on B2:B8.`);
              console.log("Try changing the value in A1 — the highlights update automatically.");
            }
          });
        }

        /** Default helper for invoking an action and handling errors. */
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
            <p>
                A <strong>synchronous custom function</strong> (<code>@supportSync</code>) evaluates
                alongside Excel's calculation, unlike async functions which return <code>#CALC!</code>
                inside conditional format rules.
            </p>
            <p>
                <code>EXCEEDSTARGET(value, targetAddress)</code> reads a threshold from another cell
                and returns <code>true</code> if the value exceeds it — perfect for use in a
                conditional format rule that responds to a live target.
            </p>
        </section>
        <section>
            <h3>Try it out</h3>
            <ol>
                <li>Register this snippet in the <strong>Custom Functions</strong> dashboard.</li>
                <li>Click <strong>Set up data</strong> below.</li>
                <li>
                    Select <strong>B2:B8</strong> in the sheet, then go to
                    <strong>Home &rarr; Conditional Formatting &rarr; New Rule &rarr; Use a formula</strong>.
                    Enter: <code>=NAMESPACE.EXCEEDSTARGET(B2,"$A$1")</code>
                    <br/>(Replace <strong>NAMESPACE</strong> with the prefix shown in the dashboard.)
                </li>
                <li>Click <strong>Verify</strong> to confirm the rule is active, then change <strong>A1</strong> to see highlights update live.</li>
            </ol>
            <button id="setup">Set up data</button>
            <button id="verify">Verify format</button>
        </section>
    language: html
