order: 5
id: excel-scenarios-currency-converter
name: Currency Converter
description: Converts currency values in a table using mock exchange rates.
author: cakriwut
host: EXCEL
api_set:
    ExcelApi: '1.4'
script:
    content: |-
        /*
        * Copyright (c) Riwut Libinuko. All rights reserved. Licensed under the MIT license.
        */

        const tableName = "TransactionTable";

        let tableSetup: Record<string, number> = {};

        document.getElementById("convert").addEventListener("click", () => tryCatch(convert));
        document.getElementById("setup").addEventListener("click", () => tryCatch(setupSample));

        /** Main converting function **/
        async function convert() {
          await Excel.run(async (context) => {
            const table = context.workbook.tables.getItem(tableName);
            table.columns.load("items");
            table.rows.load("items,value");
            await context.sync();

            if (!isTableValid(table.columns.items)) {
              console.error(
                'Error: Some of default table header is missing. Required headers: \r\n"Currency","Price (Currency)","Transaction Date","Base","Price in Base"'
              );
              return;
            }

            const convertedCurrency = table.rows.items.map((row) => {
              const priceInBase = row.values[0][tableSetup["Price in Base"]];
              const currency = row.values[0][tableSetup["Currency"]];
              const baseCurrency = row.values[0][tableSetup["Base"]];

              if (priceInBase === "" || priceInBase === null || priceInBase === undefined) {
                return getMockRate(currency, baseCurrency);
              } else {
                return -1;
              }
            });
              
            let index =0;
            let skippedRows = [];
            for (let row of table.rows.items) {
              const priceBaseRange = row.getRange().getCell(0, tableSetup["Price in Base"]);
              const priceInCurrency = row.values[0][tableSetup["Price (Currency)"]];
              const baseCurrency = row.values[0][tableSetup["Base"]];

              if (convertedCurrency[index] == -1) {
                skippedRows.push(index+1);    
              } else if (convertedCurrency[index] === null) {
                console.error(`Row ${index+1}: No mock exchange rate available for this currency pair.`);
              } else {
                const converted = convertedCurrency[index] * priceInCurrency;
                priceBaseRange.values = [[converted]];
              }
              index++;
            }
            
            if(skippedRows.length > 0) {
              if(skippedRows.length == 1) {
                console.info(`Row: ${skippedRows.join(',')} has been converted. Skipped.`);
              } else {
                console.info(`Rows: ${skippedRows.join(',')} have been converted. Skipped.`);
              }
            }

            await context.sync();
          });
        }

        /** Check if the table contains the necessary columns.
        *** These columns can be in any order within the table.
        **/
        function isTableValid(items: Excel.TableColumn[]) {
          // Build the column index, search table header
          // Currency - origin currency
          // Price (Currency) - price in origin currency
          // Base  - home currency
          // Price in Base - price in base currency
          items.forEach((col, idx, arr) => {
            tableSetup[col.name] = idx;
          });
          if (tableSetup['Currency'] === undefined ||
              tableSetup['Price (Currency)'] === undefined ||
              tableSetup['Base'] === undefined ||
              tableSetup['Price in Base'] === undefined) {
            return false;
          }
          return true;
        }

        /** Mock exchange rates for demonstration (approximate mid-market values). */
        const mockRates: Record<string, Record<string, number>> = {
          USD: { EUR: 0.92, GBP: 0.79, JPY: 149.50, SGD: 1.34, MYR: 4.72, CNY: 7.24, AUD: 1.53, CAD: 1.36, CHF: 0.90 },
          EUR: { USD: 1.09, GBP: 0.86, JPY: 162.80, SGD: 1.46, MYR: 5.14, CNY: 7.88, AUD: 1.67, CAD: 1.48, CHF: 0.98 },
          GBP: { USD: 1.27, EUR: 1.16, JPY: 189.90, SGD: 1.70, MYR: 5.99, CNY: 9.18, AUD: 1.94, CAD: 1.72, CHF: 1.14 },
          SGD: { USD: 0.75, EUR: 0.69, GBP: 0.59, JPY: 111.60, MYR: 3.52, CNY: 5.40, AUD: 1.14, CAD: 1.02, CHF: 0.67 },
          MYR: { USD: 0.21, EUR: 0.19, GBP: 0.17, JPY: 31.70, SGD: 0.28, CNY: 1.53, AUD: 0.32, CAD: 0.29, CHF: 0.19 },
          CNY: { USD: 0.14, EUR: 0.13, GBP: 0.11, JPY: 20.65, SGD: 0.185, MYR: 0.65, AUD: 0.21, CAD: 0.19, CHF: 0.12 },
          JPY: { USD: 0.0067, EUR: 0.0061, GBP: 0.0053, SGD: 0.009, MYR: 0.032, CNY: 0.049, AUD: 0.010, CAD: 0.0091, CHF: 0.006 },
          AUD: { USD: 0.65, EUR: 0.60, GBP: 0.52, JPY: 97.6, SGD: 0.88, MYR: 3.09, CNY: 4.73, CAD: 0.89, CHF: 0.59 },
          CAD: { USD: 0.74, EUR: 0.68, GBP: 0.58, JPY: 109.9, SGD: 0.99, MYR: 3.47, CNY: 5.32, AUD: 1.12, CHF: 0.66 },
          CHF: { USD: 1.11, EUR: 1.02, GBP: 0.88, JPY: 166.1, SGD: 1.49, MYR: 5.24, CNY: 8.04, AUD: 1.70, CAD: 1.51 }
        };

        /** Look up a mock exchange rate from one currency to another. Returns null if the pair is unsupported. */
        function getMockRate(from: string, to: string): number | null {
          if (from === to) return 1;
          return mockRates[from]?.[to] ?? null;
        }

        /** Default helper for invoking an action and handling errors. */
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
        /* Create sample data */
        /* Default header */
        /* "Currency","Price (Currency)","Transaction Date","Base","Price in Base" */
        async function setupSample() {
          await Excel.run(async (context) => {
            context.workbook.worksheets.getItemOrNullObject("Sample").delete();
            const sheet = context.workbook.worksheets.add("Sample");
            const transactionTable = sheet.tables.add("A1:F1", true);
            transactionTable.name = tableName;
            transactionTable.getHeaderRowRange().values = [["Product", "Currency", "Price (Currency)", "Transaction Date", "Base", "Price in Base"]];
            transactionTable.rows.add(null, [
              ["Frames", "MYR", 5000, "2019-10-05", "SGD", null],
              ["Chains", "CNY", 12000, "2019-10-04", "SGD", null],
              ["Widgets", "GBP", 3200, "2019-10-03", "USD", null],
              ["Gears", "JPY", 850000, "2019-10-02", "EUR", null]
            ]);
            transactionTable.getRange().format.autofitColumns();
            sheet.activate();
          });
        }
    language: typescript
template:
    content: |-
        <header class="header" style='text-align: center'>
          <h1>Simple Currency Converter</h1>
        </header>
        <section>
          <p>This simple currency converter shows how to read data from a transaction table and uses a mock currency converter to
            calculate the amount in base currency. </p>
          <p>The code also performs table validation and identifies if the table has predefined headers. Try to rearrange the
            columns to see for yourself! </p>
        </section>
        <section class="setup">
          <h3>Set up</h3>
          <button id="setup">Add sample data</button>
        </section>
        <section>
          <h3>Try it out</h3>
          <p>The currency conversion uses built-in mock exchange rates for demonstration purposes.</p>
          <button id="convert">Convert</button>
        </section>
    language: html
