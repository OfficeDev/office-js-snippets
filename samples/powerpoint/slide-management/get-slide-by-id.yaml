order: 6
id: powerpoint-slide-management-get-slide-by-id
name: Get slide from selected slides by ID
description: Gets a slide by its ID from the currently selected slides.
host: POWERPOINT
api_set:
    PowerPointApi: '1.5'
script:
    content: |
        document.getElementById("get-selected-slide-ids").addEventListener("click", () => tryCatch(getSelectedSlideIds));
        document.getElementById("get-slide-by-id").addEventListener("click", () => tryCatch(getSlideById));
        document.getElementById("setup").addEventListener("click", () => tryCatch(setup));

        async function getSelectedSlideIds() {
          // Gets the IDs of the currently selected slides and lists them in the task pane.
          await PowerPoint.run(async (context) => {
            const selectedSlides: PowerPoint.SlideScopedCollection = context.presentation.getSelectedSlides();
            selectedSlides.load("items/id");
            await context.sync();

            if (selectedSlides.items.length === 0) {
              console.log("No slides are selected.");
              return;
            }

            console.log(`Selected slide IDs (${selectedSlides.items.length} slide(s)):`);
            selectedSlides.items.forEach((slide, index) => {
              console.log(`  Scoped index: [${index}] - ID: ${slide.id}`);
            });
          });
        }

        async function getSlideById() {
          // Uses getItemOrNullObject to find a slide by ID within the selected slides.
          // If the ID is not found in the selected slides, the returned object's isNullObject property is true.
          await PowerPoint.run(async (context) => {
            const slideId = (document.getElementById("slide-id-input") as HTMLInputElement).value.trim();
            if (!slideId) {
              console.log("Enter a slide ID in the text box first.");
              return;
            }

            const selectedSlides: PowerPoint.SlideScopedCollection = context.presentation.getSelectedSlides();

            // getItemOrNullObject returns a Slide object without throwing if the ID isn't found.
            const slide: PowerPoint.Slide = selectedSlides.getItemOrNullObject(slideId);
            slide.load("id");
            await context.sync();

            if (slide.isNullObject) {
              console.log(`Slide ID "${slideId}" was not found in the selected slides.`);
            } else {
              console.log(`Slide found in the selected slides.`);
              console.log(`  ID: ${slide.id}`);
            }
          });
        }

        async function setup() {
          await PowerPoint.run(async (context) => {
            // Adds a new slide with some content.
            const slideCountResult = context.presentation.slides.getCount();
            context.presentation.slides.add();
            await context.sync();

            const newSlide = context.presentation.slides.getItemAt(slideCountResult.value);
            newSlide.load("id");
            newSlide.shapes.addGeometricShape(PowerPoint.GeometricShapeType.hexagon);
            await context.sync();

            console.log(`Added slide - ID: ${newSlide.id}`);

            // Switch to the new slide.
            context.presentation.setSelectedSlides([newSlide.id]);
            await context.sync();

            console.log(`Switched to the new slide - ID: ${newSlide.id}`);
          });
        }

        /** Default helper for invoking an action and handling errors. */
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
          <p>This sample demonstrates <code>SlideScopedCollection.getItemOrNullObject</code>, which retrieves a slide by its ID from the selected slides collection without throwing an error if the ID isn't found.</p>
        </section>
        <section class="setup">
            <h3>Set up</h3>
            <button id="setup">Set up</button>
        </section>
        <section>
          <h3>Try it out</h3>
          <p>Select one or more slides in the presentation, then click <b>Get selected slide IDs</b> to see their IDs in the console.</p>
          <p />
          <button id="get-selected-slide-ids">Get selected slide IDs</button>
          <p />
          <p>Enter one of the IDs (or an invalid ID) and click <b>Get slide by ID</b>.</p>
          <p><label>Slide ID: <input id="slide-id-input" type="text" placeholder="Enter a slide ID" /></label></p>
          <button id="get-slide-by-id">Get slide by ID</button>
        </section>
    language: html
