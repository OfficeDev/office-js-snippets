order: 9
id: word-content-controls-insert-and-change-date-picker-content-control
name: Manage date picker content controls
description: Inserts, updates, retrieves, and deletes date picker content controls.
host: WORD
api_set:
    WordApiDesktop: '1.3'
script:
    content: |-
        document.getElementById("insert-control").addEventListener("click", () => tryCatch(insertDatePickerContentControl));
        document.getElementById("change-properties").addEventListener("click", () => tryCatch(changeDatePickerProperties));
        document.getElementById("get-properties").addEventListener("click", () => tryCatch(getDatePickerProperties));
        document.getElementById("delete-control").addEventListener("click", () => tryCatch(deleteDatePickerContentControl));
        document.getElementById("setup").addEventListener("click", () => tryCatch(setup));

        async function insertDatePickerContentControl() {
          // Inserts a date picker content control on the second paragraph.
          await Word.run(async (context) => {
            const paragraphs = context.document.body.paragraphs;
            paragraphs.load("$none");

            await context.sync();

            // Insert a date picker content control on the second paragraph.
            const datePicker = paragraphs.items[1].insertContentControl(Word.ContentControlType.datePicker);
            datePicker.title = "Choose a date";
            datePicker.tag = "date-picker";
            console.log("Date picker content control inserted.");

            await context.sync();
          });
        }

        async function changeDatePickerProperties() {
          // Changes the calendar type, display format, locale, and storage format of the first date picker content control.
          await Word.run(async (context) => {
            let contentControls = context.document.getContentControls({
              types: [Word.ContentControlType.datePicker]
            });
            contentControls.load("items");

            await context.sync();

            if (contentControls.items.length === 0) {
              console.warn("No date picker content controls found in the document.");
              return;
            }

            const firstControl = contentControls.items[0];
            firstControl.load("datePickerContentControl");

            await context.sync();

            const datePicker: Word.DatePickerContentControl = firstControl.datePickerContentControl;

            // Set the display locale first, since calendar type must be compatible with the locale.
            datePicker.dateDisplayLocale = Word.LanguageId.japanese;

            // Set the calendar type (must be compatible with the locale set above).
            datePicker.dateCalendarType = Word.CalendarType.japan;

            // Set the display format.
            datePicker.dateDisplayFormat = "yyyy/MM/dd";

            // Set the storage format to DateTime.
            datePicker.dateStorageFormat = Word.ContentControlDateStorageFormat.dateTime;

            await context.sync();

            console.log("Date picker properties updated:");
            console.log("  Calendar type: Japan");
            console.log("  Display format: yyyy/MM/dd");
            console.log("  Display locale: Japanese");
            console.log("  Storage format: DateTime");
          });
        }

        async function getDatePickerProperties() {
          // Gets and logs the properties of the first date picker content control.
          await Word.run(async (context) => {
            let contentControls = context.document.getContentControls({
              types: [Word.ContentControlType.datePicker]
            });
            contentControls.load("items");

            await context.sync();

            if (contentControls.items.length === 0) {
              console.warn("No date picker content controls found in the document.");
              return;
            }

            const firstControl = contentControls.items[0];
            firstControl.load("datePickerContentControl");

            await context.sync();

            const datePicker: Word.DatePickerContentControl = firstControl.datePickerContentControl;
            datePicker.load("dateCalendarType, dateDisplayFormat, dateDisplayLocale, dateStorageFormat");

            await context.sync();

            console.log("Date picker content control properties:");
            console.log("  Calendar type: " + datePicker.dateCalendarType);
            console.log("  Display format: " + datePicker.dateDisplayFormat);
            console.log("  Display locale: " + datePicker.dateDisplayLocale);
            console.log("  Storage format: " + datePicker.dateStorageFormat);
          });
        }

        async function deleteDatePickerContentControl() {
          // Deletes the first date picker content control found in the selection.
          await Word.run(async (context) => {
            const selectedRange: Word.Range = context.document.getSelection();
            let selectedContentControl = selectedRange
              .getContentControls({
                types: [Word.ContentControlType.datePicker]
              })
              .getFirstOrNullObject();
            selectedContentControl.load("id");

            await context.sync();

            if (selectedContentControl.isNullObject) {
              // The selection doesn't contain a date picker, but the cursor might be inside one.
              // Check if the selection's parent content control is a date picker.
              const parentContentControl: Word.ContentControl = selectedRange.parentContentControlOrNullObject;
              parentContentControl.load("id,type");
              await context.sync();

              if (parentContentControl.isNullObject || parentContentControl.type !== Word.ContentControlType.datePicker) {
                console.warn("Please select a date picker content control before clicking Delete.");
                return;
              } else {
                selectedContentControl = parentContentControl;
              }
            }

            console.log(`About to delete date picker content control with id: ${selectedContentControl.id}`);
            selectedContentControl.delete(false);
            await context.sync();

            console.log("Deleted date picker content control.");
          });
        }

        async function setup() {
          await Word.run(async (context) => {
            const body: Word.Body = context.document.body;
            body.clear();
            body.insertParagraph("Date Picker Content Control Sample", "Start");
            body.insertParagraph("Select a date: click Insert to add a date picker here", "End");

            await context.sync();

            console.log("Setup complete. Click Insert to add a date picker.");
          });
        }

        // Default helper for invoking an action and handling errors.
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
            This sample demonstrates how to insert, change, and delete date picker content controls using the CalendarType and related APIs.
        </section>
        <section class="setup">
            <h3>Set up</h3>
            <button id="setup">Setup</button>
        </section>
        <section>
            <h3>Try it out</h3>
            <p>
                <span>Insert a date picker content control on the second paragraph.</span>
                <button id="insert-control">Insert</button>
            </p>
            <p>
                <span><b>Select</b> the date picker and choose a date.</span>
            </p>
            <p>
                <span>Change the calendar type, display format, locale, and storage format of the selected date picker.</span>
                <button id="change-properties">Change properties</button>
            </p>
            <p>
                <span>Get the properties of the first date picker content control.</span>
                <button id="get-properties">Get properties</button>
            </p>
            <p>
                <span>Delete the selected date picker content control.</span>
                <button id="delete-control">Delete selected</button>
            </p>
        </section>
        <section>
            <p><b>Important</b>: This API is only available in Word on Windows (WordApiDesktop 1.3). It is not supported in Word on the web.</p>
        </section>
    language: html
