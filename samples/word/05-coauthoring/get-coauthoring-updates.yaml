order: 4
id: word-coauthoring-get-coauthoring-updates
name: Get coauthoring updates
description: Shows how to inspect the most recent coauthoring updates merged into a Word document.
host: WORD
api_set:
    WordApiDesktop: '1.4'
script:
    content: |-
        document.getElementById("get-updates").addEventListener("click", () => tryCatch(getUpdates));

        async function getUpdates() {
          // Gets the ranges affected by the most recent coauthoring updates merged into the document.
          await Word.run(async (context) => {
            const updates: Word.CoauthoringUpdateCollection = context.document.coauthoring.updates;
            updates.load("items/range");
            await context.sync();

            if (updates.items.length === 0) {
              console.log("No recent coauthoring updates found.");
              return;
            }

            console.log(`Found ${updates.items.length} recent update(s).`);

            const ranges = updates.items.map((u) => u.range);
            ranges.forEach((r) => r.load("text"));
            await context.sync();

            ranges.forEach((range, i) => {
              console.log(`  Update ${i + 1}: "${range.text}"`);
            });
          });
        }

        // Default helper for invoking an action and handling errors.
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
            <p>This sample shows how to inspect the document ranges that were affected by the most recently merged coauthoring updates.</p>
            <p>Make sure the document is saved to OneDrive or SharePoint to enable coauthoring features.</p>
            <p><b>Important</b>: This API is only available in Word on Windows (WordApiDesktop 1.4). It is not supported in Word on the web.</p>
        </section>
        <section>
            <h3>Try it out</h3>
            <p>
                <button id="get-updates">Get recent coauthoring updates</button>
            </p>
        </section>
    language: html
