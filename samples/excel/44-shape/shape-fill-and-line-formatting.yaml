order: 2
id: excel-shape-fill-and-line-formatting
name: Fill and line formatting
description: Shows how to format the fill and outline of a geometric shape.
host: EXCEL
api_set:
    ExcelApi: '1.9'
script:
    content: |-
        document.getElementById("setup").addEventListener("click", () => tryCatch(setup));
        document.getElementById("setSolidFill").addEventListener("click", () => tryCatch(setSolidFill));
        document.getElementById("setFillProperties").addEventListener("click", () => tryCatch(setFillProperties));
        document.getElementById("clearFill").addEventListener("click", () => tryCatch(clearFill));
        document.getElementById("formatLine").addEventListener("click", () => tryCatch(formatLine));
        document.getElementById("hideLine").addEventListener("click", () => tryCatch(hideLine));
        document.getElementById("inspectFormatting").addEventListener("click", () => tryCatch(inspectFormatting));

        async function setup() {
            await Excel.run(async (context) => {
                // Create a worksheet and add the sample shape.
                context.workbook.worksheets.getItemOrNullObject("Sample").delete();
                const sheet = context.workbook.worksheets.add("Sample");
                sheet.activate();

                const badge = sheet.shapes.addGeometricShape(Excel.GeometricShapeType.round2SameRectangle);
                badge.name = "Badge";
                badge.left = 80;
                badge.top = 60;
                badge.width = 260;
                badge.height = 120;
                badge.textFrame.textRange.text = "Shape formatting";

                await context.sync();
            });
        }

        async function setSolidFill() {
            await Excel.run(async (context) => {
                // Apply a solid fill color to the shape.
                const sheet = context.workbook.worksheets.getItem("Sample");
                const badge = sheet.shapes.getItem("Badge");
                const shapeFill: Excel.ShapeFill = badge.fill;
                shapeFill.setSolidColor("#FFE08A");

                await context.sync();
            });
        }

        async function setFillProperties() {
            await Excel.run(async (context) => {
                // Set fill color and transparency together.
                const sheet = context.workbook.worksheets.getItem("Sample");
                const badge = sheet.shapes.getItem("Badge");
                const shapeFill: Excel.ShapeFill = badge.fill;
                shapeFill.foregroundColor = "#C00000";
                shapeFill.transparency = 0.25;

                await context.sync();
            });
        }

        async function clearFill() {
            await Excel.run(async (context) => {
                // Remove the shape's fill formatting.
                const sheet = context.workbook.worksheets.getItem("Sample");
                const badge = sheet.shapes.getItem("Badge");
                const shapeFill: Excel.ShapeFill = badge.fill;
                shapeFill.clear();

                await context.sync();
            });
        }

        async function formatLine() {
            await Excel.run(async (context) => {
                // Apply outline formatting to the shape.
                const sheet = context.workbook.worksheets.getItem("Sample");
                const badge = sheet.shapes.getItem("Badge");
                const lineFormat: Excel.ShapeLineFormat = badge.lineFormat;
                lineFormat.set({
                    color: "#C55A11",
                    dashStyle: Excel.ShapeLineDashStyle.dashDotDot,
                    style: Excel.ShapeLineStyle.thinThick,
                    transparency: 0.2,
                    visible: true,
                    weight: 4
                });

                await context.sync();
            });
        }

        async function hideLine() {
            await Excel.run(async (context) => {
                // Hide the shape's outline.
                const sheet = context.workbook.worksheets.getItem("Sample");
                const badge = sheet.shapes.getItem("Badge");
                const lineFormat: Excel.ShapeLineFormat = badge.lineFormat;
                lineFormat.visible = false;

                await context.sync();
            });
        }

        async function inspectFormatting() {
            await Excel.run(async (context) => {
                // Load and log the shape's fill and outline properties.
                const sheet = context.workbook.worksheets.getItem("Sample");
                const badge = sheet.shapes.getItem("Badge");
                badge.fill.load(["foregroundColor", "transparency", "type"]);
                badge.lineFormat.load(["color", "dashStyle", "style", "transparency", "visible", "weight"]);

                await context.sync();

                console.log("Badge fill: " + JSON.stringify(badge.fill));
                console.log("Badge line format: " + JSON.stringify(badge.lineFormat));
            });
        }

        /** Default helper for invoking an action and handling errors. */
        async function tryCatch(callback) {
            try {
                await callback();
            } catch (error) {
                // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
                console.error(error);
            }
        }
    language: typescript
template:
    content: |-
        <section>
            <p>This sample shows how to format the fill and outline of a geometric shape.</p>
        </section>
        <section class="setup">
            <h3>Setup</h3>
            <button id="setup">Create a worksheet</button>
        </section>
        <section>
            <h3>Try it out</h3>
            <button id="setSolidFill">Set solid fill color</button><p/>
            <button id="setFillProperties">Set fill properties</button><p/>
            <button id="clearFill">Clear fill</button><p/>
            <button id="formatLine">Format outline</button><p/>
            <button id="hideLine">Hide outline</button><p/>
            <button id="inspectFormatting">Log fill and line properties</button>
        </section>
    language: html
