id: word-selection-insert-formula
name: Insert formula into table cell
description: This sample shows how to insert a Formula field at the selection with options for the formula expression and number format.
host: WORD
api_set:
    WordApiDesktop: '1.4'
script:
    content: |
        document
          .getElementById("insert-formula-with-options")
          .addEventListener("click", () => tryCatch(insertFormulaWithOptions));
        document.getElementById("insert-formula-auto").addEventListener("click", () => tryCatch(insertFormulaAuto));
        document.getElementById("insert-formula-custom").addEventListener("click", () => tryCatch(insertFormulaCustom));
        document.getElementById("setup").addEventListener("click", () => tryCatch(setup));

        async function insertFormulaWithOptions() {
          // Inserts a SUM formula with a currency number format at the selection.
          // The selection must be in a table cell.
          await Word.run(async (context) => {
            const options: Word.SelectionInsertFormulaOptions = {
              formula: "=SUM(ABOVE)",
              numberFormat: "$#,##0.00",
            };
            context.document.selection.insertFormula(options);
            await context.sync();

            console.log("Inserted =SUM(ABOVE) with currency format.");
          });
        }

        async function insertFormulaAuto() {
          // Inserts a formula field without specifying the formula expression.
          // Word determines the formula automatically based on adjacent cell values:
          // if there are values above the cell, it inserts =SUM(ABOVE);
          // if there are values to the left, it inserts =SUM(LEFT).
          // The selection must be in a table cell with at least one adjacent cell that contains a value.
          await Word.run(async (context) => {
            const options: Word.SelectionInsertFormulaOptions = {
              numberFormat: "#,##0.00",
            };
            context.document.selection.insertFormula(options);
            await context.sync();

            console.log("Inserted formula (auto-determined by Word) with number format.");
          });
        }

        async function insertFormulaCustom() {
          // Inserts a custom formula at the selection.
          // The selection must be in a table cell.
          await Word.run(async (context) => {
            const options: Word.SelectionInsertFormulaOptions = {
              formula: "=AVERAGE(ABOVE)",
              numberFormat: "0.00",
            };
            context.document.selection.insertFormula(options);
            await context.sync();

            console.log("Inserted =AVERAGE(ABOVE) with decimal format.");
          });
        }

        async function setup() {
          await Word.run(async (context) => {
            const body: Word.Body = context.document.body;
            body.clear();

            body.insertParagraph("Sales data", Word.InsertLocation.start);

            // Create a table with numeric values and an empty total row.
            const table: Word.Table = body.insertTable(5, 2, Word.InsertLocation.end, [
              ["Item", "Amount"],
              ["Product A", "1200"],
              ["Product B", "3450"],
              ["Product C", "870"],
              ["Total", ""],
            ]);
            table.styleBuiltIn = Word.BuiltInStyleName.tableGrid;

            await context.sync();

            console.log(
              "Setup complete. Place your cursor in the empty 'Total' cell (last row, second column), then try inserting a formula.",
            );
          });
        }

        // Default helper for invoking an action and handling errors.
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
            <p>This sample demonstrates how to insert a <a target="_blank"
                href="https://support.microsoft.com/office/32d5c9de-3516-4ec3-80ed-d1fc2b5bc21d">Formula field</a> at the
                selection using <code>Selection.insertFormula</code>. The <code>SelectionInsertFormulaOptions</code> parameter
                lets you specify the formula expression and a number format for the result.</p>
        </section>
        <section class="setup">
            <h3>Set up</h3>
            <button id="setup">Set up</button>
        </section>
        <section>
          <h3>Try it out</h3>
          <p>After setup, place your cursor in the empty <strong>Total</strong> cell (last row, second column), then click
                a button below.</p>
          <ul>
            <li>
                <div>Inserts <code>=SUM(ABOVE)</code> with a currency number format (<code>$#,##0.00</code>).</div>
                <button id="insert-formula-with-options">Insert SUM formula with options</button>
            </li>
            <li>
                <div>Inserts a formula field without specifying the formula expression. Word determines the formula automatically based on adjacent cell values.</div>
                <button id="insert-formula-auto">Insert formula (auto)</button>
            </li>
            <li>
                <div>Inserts <code>=AVERAGE(ABOVE)</code> with a decimal number format (<code>0.00</code>).</div>
                <button id="insert-formula-custom">Insert AVERAGE formula</button>
            </li>
          </ul>
        </section>
    language: html
