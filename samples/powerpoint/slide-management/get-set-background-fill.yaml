order: 8
id: powerpoint-slide-management-get-set-background-fill
name: Get and set slide background fill
description: Gets and sets the background fill of a slide using solid, gradient, pattern, and picture fill types.
host: POWERPOINT
api_set:
    PowerPointApi: '1.10'
script:
    content: |
        document.getElementById("getBackgroundFill").addEventListener("click", () => tryCatch(getBackgroundFill));
        document.getElementById("setSolidFill").addEventListener("click", () => tryCatch(setSolidFill));
        document.getElementById("getSolidFill").addEventListener("click", () => tryCatch(getSolidFill));
        document.getElementById("setGradientFill").addEventListener("click", () => tryCatch(setGradientFill));
        document.getElementById("getGradientFill").addEventListener("click", () => tryCatch(getGradientFill));
        document.getElementById("setPatternFill").addEventListener("click", () => tryCatch(setPatternFill));
        document.getElementById("getPatternFill").addEventListener("click", () => tryCatch(getPatternFill));
        document.getElementById("setPictureFill").addEventListener("click", () => tryCatch(setPictureFill));
        document.getElementById("getPictureFill").addEventListener("click", () => tryCatch(getPictureFill));

        async function getBackgroundFill() {
          // Gets the background fill type of the first selected slide.
          await PowerPoint.run(async (context) => {
            const slides = context.presentation.getSelectedSlides();
            slides.load("items");
            await context.sync();

            if (slides.items.length === 0) {
              console.warn("No slides are selected.");
              return;
            }

            const slide = slides.items[0];
            const fill: PowerPoint.SlideBackgroundFill = slide.background.fill;
            fill.load("type");
            await context.sync();

            const fillType = fill.type as PowerPoint.SlideBackgroundFillType;
            console.log(`Background fill type: ${fillType}`);
          });
        }

        async function setSolidFill() {
          // Sets the background of the first selected slide to a solid orange fill at 20% transparency.
          await PowerPoint.run(async (context) => {
            const slides = context.presentation.getSelectedSlides();
            slides.load("items");
            await context.sync();

            if (slides.items.length === 0) {
              console.warn("No slides are selected.");
              return;
            }

            const slide = slides.items[0];
            slide.background.fill.setSolidFill({
              color: "#FF8C00",
              transparency: 0.2,
            } as PowerPoint.SlideBackgroundSolidFillOptions);
            await context.sync();

            console.log("Background set to solid orange fill (20% transparent).");
          });
        }

        async function getSolidFill() {
          // Gets the solid fill properties of the first selected slide's background.
          // If the background is not a solid fill, logs a message indicating that.
          await PowerPoint.run(async (context) => {
            const slides = context.presentation.getSelectedSlides();
            slides.load("items");
            await context.sync();

            if (slides.items.length === 0) {
              console.warn("No slides are selected.");
              return;
            }

            const slide = slides.items[0];
            const fill: PowerPoint.SlideBackgroundFill = slide.background.fill;
            fill.load("type");
            await context.sync();

            if (fill.type !== PowerPoint.SlideBackgroundFillType.solid) {
              console.warn("The slide background isn't a solid fill.");
              return;
            }

            const solidFill: PowerPoint.SlideBackgroundSolidFill = slide.background.fill.getSolidFillOrNullObject();
            solidFill.load(["color", "transparency"]);
            await context.sync();

            if (solidFill.isNullObject) {
              console.warn("The slide background isn't a solid fill.");
            } else {
              console.log("Solid fill:", `- color: ${solidFill.color}`, `- transparency: ${solidFill.transparency}`);
            }
          });
        }

        async function setGradientFill() {
          // Sets the background of the first selected slide to a linear gradient fill.
          await PowerPoint.run(async (context) => {
            const slides = context.presentation.getSelectedSlides();
            slides.load("items");
            await context.sync();

            if (slides.items.length === 0) {
              console.warn("No slides are selected.");
              return;
            }

            const slide = slides.items[0];
            slide.background.fill.setGradientFill({
              type: PowerPoint.SlideBackgroundGradientFillType.linear,
            } as PowerPoint.SlideBackgroundGradientFillOptions);
            await context.sync();

            console.log("Background set to linear gradient fill.");
          });
        }

        async function getGradientFill() {
          // Gets the gradient fill properties of the first selected slide's background.
          // If the background is not a gradient fill, logs a message indicating that.
          await PowerPoint.run(async (context) => {
            const slides = context.presentation.getSelectedSlides();
            slides.load("items");
            await context.sync();

            if (slides.items.length === 0) {
              console.warn("No slides are selected.");
              return;
            }

            const slide = slides.items[0];
            const fill: PowerPoint.SlideBackgroundFill = slide.background.fill;
            fill.load("type");
            await context.sync();

            if (fill.type !== PowerPoint.SlideBackgroundFillType.gradient) {
              console.warn("The slide background isn't a gradient fill.");
              return;
            }

            const gradientFill: PowerPoint.SlideBackgroundGradientFill = slide.background.fill.getGradientFillOrNullObject();
            gradientFill.load("type");
            await context.sync();

            if (gradientFill.isNullObject) {
              console.warn("The slide background isn't a gradient fill.");
            } else {
              console.log("Gradient fill:", `- type: ${gradientFill.type}`);
            }
          });
        }

        async function setPatternFill() {
          // Sets the background of the first selected slide to a diagonal cross pattern fill.
          await PowerPoint.run(async (context) => {
            const slides = context.presentation.getSelectedSlides();
            slides.load("items");
            await context.sync();

            if (slides.items.length === 0) {
              console.warn("No slides are selected.");
              return;
            }

            const slide = slides.items[0];
            slide.background.fill.setPatternFill({
              foregroundColor: "#1F3864",
              backgroundColor: "#D6E4F7",
              pattern: PowerPoint.SlideBackgroundPatternFillType.diagonalCross,
            } as PowerPoint.SlideBackgroundPatternFillOptions);
            await context.sync();

            console.log("Background set to diagonal cross pattern fill.");
          });
        }

        async function getPatternFill() {
          // Gets the pattern fill properties of the first selected slide's background.
          // If the background is not a pattern fill, logs a message indicating that.
          await PowerPoint.run(async (context) => {
            const slides = context.presentation.getSelectedSlides();
            slides.load("items");
            await context.sync();

            if (slides.items.length === 0) {
              console.warn("No slides are selected.");
              return;
            }

            const slide = slides.items[0];
            const fill: PowerPoint.SlideBackgroundFill = slide.background.fill;
            fill.load("type");
            await context.sync();

            if (fill.type !== PowerPoint.SlideBackgroundFillType.pattern) {
              console.warn("The slide background isn't a pattern fill.");
              return;
            }

            const patternFill: PowerPoint.SlideBackgroundPatternFill = slide.background.fill.getPatternFillOrNullObject();
            patternFill.load(["foregroundColor", "backgroundColor", "pattern"]);
            await context.sync();

            if (patternFill.isNullObject) {
              console.warn("The slide background isn't a pattern fill.");
            } else {
              console.log(
                "Pattern fill:",
                `- foregroundColor: ${patternFill.foregroundColor}`,
                `- backgroundColor: ${patternFill.backgroundColor}`,
                `- pattern: ${patternFill.pattern}`,
              );
            }
          });
        }

        async function setPictureFill() {
          // Sets the background of the first selected slide to a picture fill at 60% transparency.
          // Uses a sample image from a Base64-encoded string.
          await PowerPoint.run(async (context) => {
            const slides = context.presentation.getSelectedSlides();
            slides.load("items");
            await context.sync();

            if (slides.items.length === 0) {
              console.warn("No slides are selected.");
              return;
            }

            const slide = slides.items[0];
            slide.background.fill.setPictureOrTextureFill({
              imageBase64: getSampleImageAsBase64String(),
              transparency: 0.6,
            } as PowerPoint.SlideBackgroundPictureOrTextureFillOptions);
            await context.sync();

            console.log("Background set to picture fill (60% transparent).");
          });
        }

        async function getPictureFill() {
          // Gets the picture or texture fill properties of the first selected slide's background.
          // If the background is not a picture or texture fill, logs a message indicating that.
          await PowerPoint.run(async (context) => {
            const slides = context.presentation.getSelectedSlides();
            slides.load("items");
            await context.sync();

            if (slides.items.length === 0) {
              console.warn("No slides are selected.");
              return;
            }

            const slide = slides.items[0];
            const fill: PowerPoint.SlideBackgroundFill = slide.background.fill;
            fill.load("type");
            await context.sync();

            if (fill.type !== PowerPoint.SlideBackgroundFillType.pictureOrTexture) {
              console.warn("The slide background isn't a picture or texture fill.");
              return;
            }

            const pictureFill: PowerPoint.SlideBackgroundPictureOrTextureFill =
              slide.background.fill.getPictureOrTextureFillOrNullObject();
            pictureFill.load("transparency");
            await context.sync();

            if (pictureFill.isNullObject) {
              console.warn("The slide background isn't a picture or texture fill.");
            } else {
              console.log("Picture or texture fill:", `- transparency: ${pictureFill.transparency}`);
            }
          });
        }

        function getSampleImageAsBase64String() {
          // A production add-in code could get an image from an
          // online source and pass it to a library function that
          // converts to Base64 encoding.
          return "";
        }

        /** Default helper for invoking an action and handling errors. */
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
            <p>This sample shows how to get and set the background fill of a slide using solid, gradient, pattern, and picture
                fill types.</p>
        </section>
        <section>
            <h3>Try it out</h3>
            <p>Select a slide in your presentation, then use the buttons.</p>
            <button id="getBackgroundFill">Get background fill type</button>
            <button id="setSolidFill">Set solid fill<br>(orange, 20% transparent)</button>
            <button id="getSolidFill">Get solid fill properties</button>
            <button id="setGradientFill">Set gradient fill (linear)</button>
            <button id="getGradientFill">Get gradient fill properties</button>
            <button id="setPatternFill">Set pattern fill (diagonal cross)</button>
            <button id="getPatternFill">Get pattern fill properties</button>
            <button id="setPictureFill">Set picture fill (60% transparent)</button>
            <button id="getPictureFill">Get picture fill properties</button>
        </section>
    language: html
