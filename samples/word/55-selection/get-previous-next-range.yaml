id: word-selection-get-previous-next-range
name: Get next and previous range
description: This sample shows how to use Selection.getNextRange and Selection.getPreviousRange with options to navigate by different units (word, sentence, paragraph) and counts.
host: WORD
api_set:
    WordApiDesktop: '1.4'
script:
    content: |
        document.getElementById("get-next-word").addEventListener("click", () => tryCatch(getNextWord));
        document.getElementById("get-next-paragraph").addEventListener("click", () => tryCatch(getNextParagraph));
        document.getElementById("get-previous-word").addEventListener("click", () => tryCatch(getPreviousWord));
        document.getElementById("get-previous-sentence").addEventListener("click", () => tryCatch(getPreviousSentence));
        document.getElementById("setup").addEventListener("click", () => tryCatch(setup));

        async function getNextWord() {
          // Gets the range of the next word relative to the current selection.
          await Word.run(async (context) => {
            const options: Word.SelectionNextOptions = {
              unit: Word.OperationUnit.word,
              count: 1,
            };
            const nextRange: Word.Range = context.document.selection.getNextRange(options);
            nextRange.load("text");
            await context.sync();

            console.log(`Next word: "${nextRange.text}"`);
          });
        }

        async function getNextParagraph() {
          // Gets the range of the next paragraph relative to the current selection.
          await Word.run(async (context) => {
            const options: Word.SelectionNextOptions = {
              unit: Word.OperationUnit.paragraph,
              count: 1,
            };
            const nextRange: Word.Range = context.document.selection.getNextRange(options);
            nextRange.load("text");
            await context.sync();

            console.log(`Next paragraph: "${nextRange.text.trim()}"`);
          });
        }

        async function getPreviousWord() {
          // Gets the range of the previous word relative to the current selection.
          await Word.run(async (context) => {
            const options: Word.SelectionPreviousOptions = {
              unit: Word.OperationUnit.word,
              count: 1,
            };
            const previousRange: Word.Range = context.document.selection.getPreviousRange(options);
            previousRange.load("text");
            await context.sync();

            console.log(`Previous word: "${previousRange.text}"`);
          });
        }

        async function getPreviousSentence() {
          // Gets the range of the previous sentence relative to the current selection.
          await Word.run(async (context) => {
            const options: Word.SelectionPreviousOptions = {
              unit: Word.OperationUnit.sentence,
              count: 1,
            };
            const previousRange: Word.Range = context.document.selection.getPreviousRange(options);
            previousRange.load("text");
            await context.sync();

            console.log(`Previous sentence: "${previousRange.text.trim()}"`);
          });
        }

        async function setup() {
          await Word.run(async (context) => {
            const body: Word.Body = context.document.body;
            body.clear();
            body.insertParagraph(
              "The quick brown fox jumps over the lazy dog. Pack my box with five dozen jugs.",
              Word.InsertLocation.start
            );
            body.insertParagraph(
              "How vexingly quick daft zebras jump! Sphinx of black quartz, judge my vow.",
              Word.InsertLocation.end
            );
            body.insertParagraph(
              "Waltz, bad nymph, for quick jigs vex. The five boxing wizards jump quickly.",
              Word.InsertLocation.end
            );
            await context.sync();

            console.log("Setup complete. Place your cursor somewhere in the document text, then try the buttons.");
          });
        }

        // Default helper for invoking an action and handling errors.
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
            <p>This sample demonstrates how to use <code>Selection.getNextRange</code> and
                <code>Selection.getPreviousRange</code> to navigate the document relative to the current selection.
                The <code>SelectionNextOptions</code> and <code>SelectionPreviousOptions</code> parameters let you
                specify the <code>unit</code> (e.g., word, sentence, paragraph) and <code>count</code> (number of
                units to move).</p>
        </section>
        <section class="setup">
            <h3>Set up</h3>
            <button id="setup">Set up</button>
        </section>
        <section>
            <h3>Try it out</h3>
            <p>Place your cursor somewhere in the document text, then click a button to get the adjacent range.</p>
            <ul>
                <li>
                    <div>Gets the range of the next word (<code>unit: "Word"</code>, <code>count: 1</code>).</div>
                    <button id="get-next-word">Get next word</button>
                </li>
                <li>
                    <div>Gets the range of the next paragraph (<code>unit: "Paragraph"</code>, <code>count: 1</code>).</div>
                    <button id="get-next-paragraph">Get next paragraph</button>
                </li>
                <li>
                    <div>Gets the range of the previous word (<code>unit: "Word"</code>, <code>count: 1</code>).</div>
                    <button id="get-previous-word">Get previous word</button>
                </li>
                <li>
                    <div>Gets the range of the previous sentence (<code>unit: "Sentence"</code>, <code>count: 1</code>).</div>
                    <button id="get-previous-sentence">Get previous sentence</button>
                </li>
            </ul>
        </section>
    language: html
