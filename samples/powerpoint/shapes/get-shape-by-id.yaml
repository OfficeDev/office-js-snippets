order: 8
id: powerpoint-shapes-get-shape-by-id
name: Get shape from selected shapes by ID
description: Shows how to get and use shape IDs with currently selected shapes.
host: POWERPOINT
api_set:
    PowerPointApi: '1.5'
script:
    content: |
        document.getElementById("get-selected-shape-ids").addEventListener("click", () => tryCatch(getSelectedShapeIds));
        document.getElementById("get-shape-by-id").addEventListener("click", () => tryCatch(getShapeById));
        document.getElementById("setup").addEventListener("click", () => tryCatch(setup));

        async function getSelectedShapeIds() {
          // Gets the IDs of the currently selected shapes and lists them in the task pane.
          await PowerPoint.run(async (context) => {
            const selectedShapes: PowerPoint.ShapeScopedCollection = context.presentation.getSelectedShapes();
            selectedShapes.load("items/id,items/name,items/type");
            await context.sync();

            if (selectedShapes.items.length === 0) {
              console.log("No shapes are selected.");
              return;
            }

            console.log(`Selected shape IDs (${selectedShapes.items.length} shape(s)):`);
            selectedShapes.items.forEach((shape, index) => {
              console.log(`  [${index}] ID: ${shape.id}  Name: "${shape.name}"  Type: ${shape.type}`);
            });
          });
        }

        async function getShapeById() {
          // Uses getItemOrNullObject to find a shape by ID within the selected shapes.
          // If the ID is not found in the selected shapes, the returned object's isNullObject property is true.
          await PowerPoint.run(async (context) => {
            const shapeId = (document.getElementById("shape-id-input") as HTMLInputElement).value.trim();
            if (!shapeId) {
              console.log("Enter a shape ID in the text box first.");
              return;
            }

            const selectedShapes: PowerPoint.ShapeScopedCollection = context.presentation.getSelectedShapes();

            // getItemOrNullObject returns a Shape object without throwing if the ID isn't found.
            const shape: PowerPoint.Shape = selectedShapes.getItemOrNullObject(shapeId);
            shape.load("id,name,type");
            await context.sync();

            if (shape.isNullObject) {
              console.log(`Shape ID "${shapeId}" was not found in the selected shapes.`);
            } else {
              console.log(`Shape found in the selected shapes.`);
              console.log(`  ID: ${shape.id}`);
              console.log(`  Name: "${shape.name}"`);
              console.log(`  Type: ${shape.type}`);
            }
          });
        }

        async function setup() {
          await PowerPoint.run(async (context) => {
            // Adds a new slide with two shapes.
            const slideCountResult = context.presentation.slides.getCount();
            context.presentation.slides.add();
            await context.sync();

            const newSlide = context.presentation.slides.getItemAt(slideCountResult.value);
            newSlide.load("id");

            // Create two shapes.
            const shape1 = newSlide.shapes.addGeometricShape(PowerPoint.GeometricShapeType.rectangle);
            shape1.left = 100;
            shape1.top = 100;
            shape1.width = 150;
            shape1.height = 100;
            shape1.fill.foregroundColor = "darkred";

            const shape2 = newSlide.shapes.addGeometricShape(PowerPoint.GeometricShapeType.ellipse);
            shape2.left = 300;
            shape2.top = 100;
            shape2.width = 150;
            shape2.height = 100;
            shape2.fill.foregroundColor = "darkblue";

            await context.sync();

            console.log(`Added slide - ID: ${newSlide.id}`);

            // Switch to the new slide.
            context.presentation.setSelectedSlides([newSlide.id]);
            await context.sync();

            console.log(`Switched to the new slide - ID: ${newSlide.id}`);
          });
        }

        /** Default helper for invoking an action and handling errors. */
        async function tryCatch(callback) {
          try {
            await callback();
          } catch (error) {
            // Note: In a production add-in, you'd want to notify the user through your add-in's UI.
            console.error(error);
          }
        }
    language: typescript
template:
    content: |-
        <section>
            <p>This sample demonstrates <code>ShapeScopedCollection.getItemOrNullObject</code>, which retrieves a shape by its
                ID from the selected shapes collection without throwing an error if the ID isn't found.</p>
        </section>
        <section class="setup">
            <h3>Set up</h3>
            <button id="setup">Set up</button>
        </section>
        <section>
            <h3>Try it out</h3>
            <p>First, select one or more shapes in the presentation.</p>
            <p />
            <p>Select <b>Get selected shape IDs</b> to see their IDs in the
            console.</p>
            <button id="get-selected-shape-ids">Get selected shape IDs</button>
            <p />
            <p>Enter one of the IDs (or an invalid ID) and select <b>Get shape by ID</b>.</p>
            <p><label>Shape ID: <input id="shape-id-input" type="text" placeholder="Enter a shape ID" /></label></p>
            <button id="get-shape-by-id">Get shape by ID</button>
        </section>
    language: html
